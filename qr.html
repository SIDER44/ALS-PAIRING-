<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ALMEER XMD — QR Code</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0d1117;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 20px;
      padding: 36px 28px;
      width: 90%;
      max-width: 380px;
      text-align: center;
    }

    .logo { font-size: 44px; margin-bottom: 10px; }

    h1 {
      font-size: 22px;
      font-weight: 800;
      background: linear-gradient(135deg, #25d366, #128c7e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 4px;
    }

    .sub { color: #8b949e; font-size: 13px; margin-bottom: 24px; }

    .qr-wrap {
      background: #fff;
      border-radius: 14px;
      padding: 16px;
      display: inline-block;
      margin-bottom: 24px;
      position: relative;
    }

    #qr-image {
      width: 240px;
      height: 240px;
      display: block;
      border-radius: 6px;
    }

    .timer-bar {
      width: 100%;
      height: 6px;
      background: #30363d;
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .timer-fill {
      height: 100%;
      background: linear-gradient(90deg, #25d366, #128c7e);
      border-radius: 3px;
      transition: width 1s linear;
    }
    .timer-text { color: #f0883e; font-size: 12px; margin-bottom: 20px; }

    .steps {
      text-align: left;
      background: #0d1117;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 20px;
    }
    .step {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
      font-size: 13px;
      color: #c9d1d9;
    }
    .step:last-child { margin-bottom: 0; }
    .num {
      background: #25d366;
      color: #000;
      border-radius: 50%;
      width: 22px; height: 22px;
      display: flex; align-items: center; justify-content: center;
      font-weight: bold; font-size: 11px;
      flex-shrink: 0;
    }

    .reload-btn {
      display: inline-block;
      background: linear-gradient(135deg, #25d366, #128c7e);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 12px 28px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.2s, transform 0.2s;
      margin-bottom: 16px;
    }
    .reload-btn:hover { opacity: 0.85; transform: scale(1.02); }

    .back { display: block; color: #8b949e; font-size: 12px; text-decoration: none; }
    .back:hover { color: #25d366; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">📷</div>
    <h1>ALMEER XMD</h1>
    <p class="sub">Scan the QR code with WhatsApp</p>

    <div class="qr-wrap">
      <img id="qr-image" src="/server" alt="QR Code" />
    </div>

    <div class="timer-bar">
      <div class="timer-fill" id="timerFill" style="width:100%"></div>
    </div>
    <p class="timer-text" id="timerText">⏳ QR expires in <span id="countdown">30</span>s</p>

    <div class="steps">
      <div class="step"><div class="num">1</div><span>Open WhatsApp on your phone</span></div>
      <div class="step"><div class="num">2</div><span>Tap ⋮ Menu → <b>Linked Devices</b></span></div>
      <div class="step"><div class="num">3</div><span>Tap <b>Link a Device</b></span></div>
      <div class="step"><div class="num">4</div><span>Point camera at the QR code above</span></div>
    </div>

    <a href="javascript:location.reload()" class="reload-btn">🔄 Refresh QR</a>
    <a href="/" class="back">← Back to Home</a>
  </div>

  <script>
    let timeLeft = 30;
    const fill      = document.getElementById('timerFill');
    const countdown = document.getElementById('countdown');
    const timerText = document.getElementById('timerText');

    const timer = setInterval(() => {
      timeLeft--;
      const pct = (timeLeft / 30) * 100;
      fill.style.width = pct + '%';
      countdown.textContent = timeLeft;

      if (timeLeft <= 0) {
        clearInterval(timer);
        timerText.textContent = '❌ QR Expired! Please refresh.';
        fill.style.background = '#f85149';
      }
    }, 1000);
  </script>
</body>
</html>
